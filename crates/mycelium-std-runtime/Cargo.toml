[package]
name = "mycelium-std-runtime"
version = "0.0.0"
description = "std.runtime — the fungal concurrency surface (M-521 / ADR-020): Colony, Scope, Task, Network, and the v0 R1 guarantee matrix."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
mycelium-core = { path = "../mycelium-core" }
mycelium-std-core = { path = "../mycelium-std-core" }
# The work-stealing Scheduler (M-709/M-861), relocated below mycelium-interp so the interpreter
# can depend on it too (M-862) without an interp<->std-runtime cycle. Re-exported at
# `crate::scheduler` for existing consumers (see src/scheduler.rs).
mycelium-sched = { path = "../mycelium-sched" }
# M-883/M-884: the reclamation (MEM-1) and supervision (M-713) surfaces relocated below
# mycelium-mlir (the runtime-ABI seam extraction — fixes the mlir->std-runtime upward-tier edge);
# re-exported at `crate::reclamation` / `crate::supervision` for existing consumers (see
# src/reclamation.rs / src/supervision.rs). The M-356 composition kernel this crate used to reuse
# via a direct `mycelium-interp` dependency is now consumed transitively through this crate.
mycelium-rt-abi = { path = "../mycelium-rt-abi" }
# M-963 (DN-78 §3 B-1/B-2): the mechanized SelectionPolicy capture/replay + reified setter
# surface rides the existing RFC-0005 machinery — mycelium-select is a foundational crate
# (depends only on mycelium-core), so this edge stays acyclic (DN-68 / H0 gate).
mycelium-select = { path = "../mycelium-select" }

[dev-dependencies]
# Property-based testing for the RT2 sequentialization + liveness + backpressure differentials.
proptest = "1"
