[package]
name = "mycelium-vsa"
version = "0.0.0"
description = "VSA submodule: VsaModel trait + MAP-I algebra, dependency-gated (RFC-0003; ADR-008). M-130."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
mycelium-core = { path = "../mycelium-core" }
# NOTE (M-971): `mycelium-select` is NO LONGER a dependency. The only code here that used it — the
# RFC-0010 decode-methodology selection (`decode_select` + `reconstruct_factors_selected`) — moved to
# the `mycelium-vsa-decode` crate. Reason: `mycelium-select -[dev]-> mycelium-interp` and
# `mycelium-interp -[normal]-> mycelium-vsa`, so a `mycelium-vsa -> mycelium-select` edge closed the
# `{interp, select, vsa}` dependency cycle DN-68's acyclic-deps invariant forbids. `mycelium-vsa` now
# depends only on `mycelium-core` (stratum 1). See DN-68 + xtask/deps-strata.toml.

[dev-dependencies]
# Manifest/value wire round-trip tests (M-260); the on-the-wire form is JSON (M-104).
serde_json.workspace = true
# Property-testing with shrinking + PROPTEST_CASES; migrates the hand-rolled LCG trial loops
# (M-654 / ADR-021 Gate A3).
proptest = "1.11"
